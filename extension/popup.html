<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        width: 280px;
        padding: 14px 16px;
        color: #1f2328;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #656d76;
        margin: 10px 0 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font-size: 13px;
        border: 1px solid #d0d7de;
        border-radius: 6px;
      }
      button {
        margin-top: 14px;
        width: 100%;
        padding: 7px 0;
        font-size: 13px;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        background: #1f883d;
        color: #fff;
        cursor: pointer;
      }
      button:hover {
        background: #1a7f37;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        color: #1a7f37;
        min-height: 14px;
      }
    </style>
  </head>
  <body>
    <h1>PR Quiz Guard</h1>
    <label for="apiKey">Anthropic API key</label>
    <input id="apiKey" type="password" placeholder="sk-ant-…" />
    <label for="model">Model</label>
    <input id="model" type="text" placeholder="claude-haiku-4-5" />
    <button id="save">Save</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
