<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --border: #d0d7de;
        --muted: #656d76;
        --text: #1f2328;
        --green: #1f883d;
        --green-hover: #1a7f37;
        --green-soft: #dafbe1;
        --red: #d1242f;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        width: 320px;
        padding: 14px 16px 12px;
        margin: 0;
        color: var(--text);
      }
      h1 {
        font-size: 14px;
        margin: 0 0 2px;
      }
      .subtitle {
        font-size: 11.5px;
        color: var(--muted);
        margin: 0 0 12px;
      }
      .providers {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 6px;
      }
      .provider {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 6px 7px;
        text-align: center;
        cursor: pointer;
        background: #fff;
        transition: border-color 0.12s, box-shadow 0.12s;
      }
      .provider:hover {
        border-color: #8c959f;
      }
      .provider.selected {
        border-color: var(--green);
        box-shadow: 0 0 0 2px rgba(31, 136, 61, 0.18);
      }
      .provider .name {
        font-size: 12.5px;
        font-weight: 600;
        display: block;
      }
      .provider .tag {
        display: block;
        font-size: 10px;
        color: var(--muted);
        margin-top: 2px;
        line-height: 1.25;
      }
      .provider.selected .tag.free-badge,
      .provider .tag.free-badge {
        color: var(--green-hover);
        font-weight: 600;
      }
      .note {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.4;
        margin: 8px 0 2px;
        min-height: 28px;
      }
      label {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        margin: 10px 0 4px;
      }
      label a {
        font-size: 11px;
        font-weight: 400;
        color: #0969da;
        text-decoration: none;
      }
      label a:hover {
        text-decoration: underline;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font-size: 13px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #fff;
        color: var(--text);
      }
      input:focus {
        outline: none;
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(31, 136, 61, 0.15);
      }
      .hidden {
        display: none;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }
      button {
        flex: 1;
        padding: 7px 0;
        font-size: 13px;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        border: 1px solid transparent;
      }
      #save {
        background: var(--green);
        color: #fff;
        border: none;
      }
      #save:hover {
        background: var(--green-hover);
      }
      #test {
        background: #f6f8fa;
        color: var(--text);
        border-color: var(--border);
      }
      #test:hover {
        background: #eef1f4;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      #status {
        margin-top: 8px;
        font-size: 12px;
        min-height: 15px;
        line-height: 1.35;
      }
      #status.ok {
        color: var(--green-hover);
      }
      #status.err {
        color: var(--red);
      }
    </style>
  </head>
  <body>
    <h1>PR Quiz Guard</h1>
    <p class="subtitle">Pick who writes &amp; grades your quiz.</p>
    <div class="providers" id="providers"></div>
    <p class="note" id="providerNote"></p>
    <div id="keyRow">
      <label for="apiKey"><span>API key</span><a id="keyLink" target="_blank" rel="noreferrer">Get a key ↗</a></label>
      <input id="apiKey" type="password" autocomplete="off" />
    </div>
    <label for="model"><span>Model</span></label>
    <input id="model" type="text" list="modelList" autocomplete="off" />
    <datalist id="modelList"></datalist>
    <div class="actions">
      <button id="test" type="button">Test</button>
      <button id="save" type="button">Save</button>
    </div>
    <div id="status"></div>
    <script src="core.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
